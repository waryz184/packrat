name: Build macOS DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14   # Apple Silicon (ARM64) — compatible avec brew ffmpeg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install Python dependencies
        run: pip install py2app PyQt6 yt-dlp

      - name: Build .app
        run: python3 setup.py py2app 2>&1

      - name: Build DMG
        run: |
          APP="$(pwd)/dist/Packrat.app"
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ]; then VERSION="dev"; fi
          OUT="Packrat-${VERSION}-macos.dmg"

          SIZE_KB=$(du -sk "$APP" | awk '{print $1}')
          SIZE_MB=$(( SIZE_KB / 1024 + 80 ))

          TMP_DMG="/tmp/packrat_build.dmg"
          MOUNT="/tmp/packrat_vol"
          rm -f "$TMP_DMG" "$OUT"
          rm -rf "$MOUNT"

          hdiutil create -size "${SIZE_MB}m" -fs HFS+ -volname "Packrat ${VERSION}" -o "$TMP_DMG" -quiet
          hdiutil attach "$TMP_DMG" -mountpoint "$MOUNT" -noautoopen -quiet

          cp -R "$APP" "$MOUNT/"
          ln -s /Applications "$MOUNT/Applications"

          sync
          sleep 1
          hdiutil detach "$MOUNT" -quiet

          hdiutil convert "$TMP_DMG" -format UDZO -imagekey zlib-level=9 -o "$OUT" -quiet
          rm -f "$TMP_DMG"

          echo "DMG_NAME=$OUT" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Packrat-macos
          path: ${{ env.DMG_NAME }}

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
